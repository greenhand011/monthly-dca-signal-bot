name: Monthly DCA Report

on:
  workflow_dispatch:
    inputs:
      base_monthly_rmb:
        description: "可选的模拟覆盖值，用于临时指定月度基线 RMB"
        required: false
        default: ""
        type: string
      review_months:
        description: "历史回顾中包含的最近月末快照数量"
        required: false
        default: "12"
        type: string
      current_total_portfolio_value_rmb:
        description: "Current total portfolio value in RMB for gold sleeve evaluation"
        required: false
        default: ""
        type: string
      current_gldm_shares:
        description: "Current GLDM share count for gold sleeve evaluation"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 1 1 * *"

permissions:
  contents: write

concurrency:
  group: monthly-dca-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q

      - name: 检测运行模式
        id: run_mode
        env:
          BASE_MONTHLY_RMB_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_monthly_rmb || '' }}
        run: |
          if [ -n "${BASE_MONTHLY_RMB_INPUT:-}" ]; then
            echo "simulation_mode=true" >> "$GITHUB_OUTPUT"
          else
            echo "simulation_mode=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 生成月度报告
        id: run_monthly_report
        env:
          BASE_MONTHLY_RMB_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.base_monthly_rmb || '' }}
          REVIEW_MONTHS_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.review_months || '12' }}
          CURRENT_TOTAL_PORTFOLIO_VALUE_RMB_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.current_total_portfolio_value_rmb || '' }}
          CURRENT_GLDM_SHARES_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.current_gldm_shares || '' }}
        run: |
          set -euo pipefail
          args=(python -m dca_signal_bot.cli run --config config/strategy.yaml --state-file state/reserve_state.json --reports-dir reports --review-months "${REVIEW_MONTHS_INPUT:-12}")
          if [ -n "${BASE_MONTHLY_RMB_INPUT:-}" ]; then
            args+=(--base-monthly-rmb "${BASE_MONTHLY_RMB_INPUT}")
          fi
          if [ -n "${CURRENT_TOTAL_PORTFOLIO_VALUE_RMB_INPUT:-}" ]; then
            args+=(--current-total-portfolio-value-rmb "${CURRENT_TOTAL_PORTFOLIO_VALUE_RMB_INPUT}")
          fi
          if [ -n "${CURRENT_GLDM_SHARES_INPUT:-}" ]; then
            args+=(--current-gldm-shares "${CURRENT_GLDM_SHARES_INPUT}")
          fi
          if [ -n "${BASE_MONTHLY_RMB_INPUT:-}" ]; then
            echo "运行模式：模拟模式（基线月投金额 = ${BASE_MONTHLY_RMB_INPUT}）"
          else
            echo "运行模式：正式模式"
          fi
          "${args[@]}"

      - name: 上传产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-dca-report-${{ github.run_id }}
          path: |
            reports/[0-9][0-9][0-9][0-9]-[0-9][0-9]-report.md
            state/reserve_state.json
          if-no-files-found: ignore

      - name: 发送工作流失败告警
        if: failure() && steps.run_monthly_report.outcome == 'success'
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone

          from dca_signal_bot.feishu_sender import build_failure_alert_text, send_feishu_text

          webhook_url = os.getenv("FEISHU_WEBHOOK_URL", "").strip()
          if not webhook_url:
              raise SystemExit("FEISHU_WEBHOOK_URL is missing or blank")

          text = build_failure_alert_text(
              error="GitHub Actions 在报告生成后失败。",
              data_source="Yahoo Finance via yfinance",
              fetched_at_utc=datetime.now(timezone.utc),
              core_ticker="VOO",
              secondary_ticker="VXUS",
              growth_ticker="QQQM",
              validation_status="FAIL",
          )
          send_feishu_text(webhook_url, text)
          PY

      - name: 提交报告与状态
        if: success() && steps.run_mode.outputs.simulation_mode != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/reserve_state.json reports/[0-9][0-9][0-9][0-9]-[0-9][0-9]-report.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: publish monthly report"
          git push origin HEAD:main
