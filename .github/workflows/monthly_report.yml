name: Monthly DCA Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 1 * *"

permissions:
  contents: write

concurrency:
  group: monthly-dca-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Run monthly report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          python -m dca_signal_bot.cli run --config config/strategy.yaml --state-file state/reserve_state.json --reports-dir reports

      - name: Commit report and state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/reserve_state.json reports/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: publish monthly report"
          git push origin HEAD:main

